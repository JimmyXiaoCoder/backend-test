server:
  port: 9090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: system-service
          uri: http://localhost:9091
          predicates:
            - Path=/api/system/**
          filters:
            - StripPrefix=1
        - id: shop-service
          uri: http://localhost:9092
          predicates:
            - Path=/api/shop/**
          filters:
            - StripPrefix=1

logging:
  level:
    com.codetest: debug

gateway:
  rate-limit:
    enabled: true
    # 默认按 URL + HTTP Method 限流；后续可改为 USER_ID 或 IP
    key-type: URL
    max-requests: 100
    window: 1m
    excluded-paths: []
