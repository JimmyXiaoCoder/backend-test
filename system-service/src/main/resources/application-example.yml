server:
  port: 9091

spring:
  application:
    name: system-service
  datasource:
    url: jdbc:mysql://localhost:3306/your_database?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: your_username
    password: your_password

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.codetest.system.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.codetest: debug
